<!DOCTYPE html>
<html>
<head>
    <title>Панель Оператора</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; }
        .ticket { border: 1px solid #555; margin: 10px; padding: 10px; background: #333; }
        textarea { width: 100%; height: 60px; }
    </style>
</head>
<body>
    <h1>Очередь вопросов от игроков</h1>
    <div id="tickets"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const ticketsDiv = document.getElementById('tickets');

        socket.on('new_ticket', (data) => {
            const div = document.createElement('div');
            div.className = 'ticket';
            div.id = `ticket-${data.id}`;
            div.innerHTML = `
                <p><b>Вопрос:</b> ${data.text}</p>
                <textarea id="input-${data.id}" placeholder="Твой ответ (пиши как робот)..."></textarea>
                <button onclick="sendAnswer(${data.id})">Отправить ответ</button>
            `;
            ticketsDiv.appendChild(div);
        });

        function sendAnswer(id) {
            const answer = document.getElementById(`input-${id}`).value;
            socket.emit('admin_answer', { ticketId: id, answer: answer });
            document.getElementById(`ticket-${id}`).remove();
        }
    </script>
</body>
</html>
